version: 2
project_name: go-go-agent

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: chat-linux
    env:
      - CGO_ENABLED=1
      - CC_linux_amd64=gcc
      - CXX_linux_amd64=g++
      - CC_linux_arm64=aarch64-linux-gnu-gcc
      - CXX_linux_arm64=aarch64-linux-gnu-g++
      - 'CC={{ index .Env (print "CC_" .Os "_" .Arch) }}'
      - 'CXX={{ index .Env (print "CXX_" .Os "_" .Arch) }}'
    main: ./cmd/chat
    binary: chat
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: chat-darwin
    env:
      - CGO_ENABLED=1
    main: ./cmd/chat
    binary: chat
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

signs:
  - artifacts: checksum
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]

brews:
  - name: chat
    description: "Tool-using Geppetto chat agent with persistent eval_js and log inspection"
    homepage: "https://github.com/go-go-golems/go-go-agent"
    repository:
      owner: go-go-golems
      name: homebrew-go-go-go
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

nfpms:
  - id: packages
    vendor: GO GO GOLEMS
    homepage: https://github.com/go-go-golems/go-go-agent
    maintainer: Manuel Odendahl <wesen@ruinwesen.com>
    description: |-
      Tool-using Geppetto chat agent with persistent eval_js and log inspection.
    license: MIT
    formats:
      - deb
      - rpm
    release: 1
    section: default
    priority: extra
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

publishers:
  - name: fury.io
    ids:
      - packages
    dir: "{{ dir .ArtifactPath }}"
    cmd: curl -F package=@{{ .ArtifactName }} https://{{ .Env.FURY_TOKEN }}@push.fury.io/go-go-golems/

